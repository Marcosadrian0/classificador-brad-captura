<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — SBK Forms</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/public/style.css">
</head>
<body style="background:#f0f2f5">
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-mark">
        <div class="lc lc1" style="background:#023631"></div>
        <div class="lc lc2" style="background:#023631"></div>
        <div class="lc lc3" style="background:#023631"></div>
      </div>
      <div>
        <div style="font-size:15px;font-weight:600;color:#023631;letter-spacing:.04em">SBK</div>
        <div style="font-size:10px;font-weight:300;color:#4A545E">Legal Operations</div>
      </div>
    </div>
    <div class="login-title">Acessar sistema</div>
    <div class="login-sub">Formulários internos — SBK</div>

    <div id="alert" style="display:none" class="alert alert-error"></div>

    <form id="form" onsubmit="login(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="seu@sbk.com.br" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;margin-top:8px" id="btn">
        Entrar
      </button>
    </form>

    <div class="login-foot">Acesso restrito a colaboradores SBK</div>
  </div>
</div>
<script>
  // Redirect if already logged in
  const token = localStorage.getItem('sbk_token');
  const user = token ? JSON.parse(localStorage.getItem('sbk_user') || 'null') : null;
  if (token && user) {
    window.location.href = user.role === 'admin' ? '/admin' : '/dashboard';
  }

  async function login(e) {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const alert = document.getElementById('alert');
    alert.style.display = 'none';
    btn.textContent = 'Entrando...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);

      localStorage.setItem('sbk_token', data.token);
      localStorage.setItem('sbk_user', JSON.stringify(data.user));
      window.location.href = data.user.role === 'admin' ? '/admin' : '/dashboard';
    } catch (err) {
      alert.textContent = err.message;
      alert.style.display = 'block';
      btn.textContent = 'Entrar';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
